<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>あなたの AI 会社 — オフィス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bar">
    <b class="brand" id="brandName">🏢 あなたのAI会社</b>
  </div>

  <div id="game"></div>

  <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

  <div class="founding" id="founding">
    <div class="confetti-layer" id="foundConfetti"></div>
    <div class="founding-inner">
      <div class="bldg">🏢</div>
      <div class="fname" id="foundName">あなたのAI会社</div>
      <div class="fslogan" id="foundSlogan"></div>
      <div class="stamp">設立</div>
    </div>
  </div>

  <div class="inaug" id="inaug">
    <div class="confetti-layer" id="confettiLayer"></div>
    <div class="inaug-card">
      <div class="crown">👑</div>
      <h2>就任、おめでとうございます！</h2>
      <p id="inaugName">本日から <b>あなた</b> が <b>社長</b> です。</p>
      <button class="mbtn alt" id="inaugBtn">就任する 🎉</button>
    </div>
  </div>

<!-- ▼ 社員名簿のフォールバック：company.template.js を先に読み、既定の社員名簿を入れておく。
     これで company.js が未生成（セットアップ未完）・読み込み失敗（構文エラー等）でも
     「社員が誰もいない」状態を防ぐ。company.js があれば下の行で上書きされる。 -->
<script src="company.template.js"></script>
<script>window.__DEFAULT_COMPANY = window.COMPANY || null;</script>
<script src="company.js"></script>
<script src="presets.js"></script>
<script src="config.js"></script>
<script>
  // ▼ ブラウザ記憶（localStorage）をクローン（=生徒さん）ごとに隔離する。
  //   同じポート（localhost:3000）を使い回しても、前のデモの会社情報が混ざらない。
  //   instanceId は config.js が持つ（デモ起動スクリプトがクローン時に固有値を刻む）。
  //   無ければ "default"（単独利用は1台1人なので衝突しない）。
  var __LS_NS = "ai_company:" + (((window.AI_CONFIG || {}).instanceId) || "default") + ":";
  function lsGet(k) { try { return localStorage.getItem(__LS_NS + k); } catch (e) { return null; } }
  function lsSet(k, v) { try { localStorage.setItem(__LS_NS + k, v); } catch (e) {} }

  // セッション中のライブ設定（セットアップパネルで立ち上げた会社）を復元
  try {
    var saved = lsGet("live");
    if (saved) window.COMPANY = JSON.parse(saved);
  } catch (e) {}

  // 社名は上部バー（ブランド表示）＋オフィス内（壁のロゴ）に表示される
  function applyHeader() {
    var c = window.COMPANY || {};
    document.title = (c.name || "あなたのAI会社") + " — オフィス";
    var bn = document.getElementById("brandName");
    if (bn) bn.textContent = "🏢 " + (c.name || "あなたのAI会社");
  }
  applyHeader();

  var overlay = document.getElementById("overlay");
  var modal = document.getElementById("modal");
  window.__talkOpen = false;

  function openPanel(html) {
    modal.innerHTML = html;
    overlay.classList.add("open");
    window.__talkOpen = true;
    var c = modal.querySelector("[data-close]");
    if (c) c.onclick = closePanel;
  }
  function closePanel() { overlay.classList.remove("open"); window.__talkOpen = false; }
  window.closePanel = closePanel;
  overlay.addEventListener("click", function (e) { if (e.target === overlay) closePanel(); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") closePanel(); });

  // state.js のライブ情報を社員名で引く
  function liveEmp(name) {
    var s = window.AI_STATE || {};
    var found = null;
    (s.employees || []).forEach(function (e) { if (e && e.name === name) found = e; });
    return found || {};
  }
  function empLog(name) {
    var s = window.AI_STATE || {};
    return (s.activity || []).filter(function (a) { return a && a.who === name; });
  }

  // ===== タスク（v2：仕事の中心）のヘルパー =====
  // addone（業務委託先）のタスクも、同じ形に変換してタスクリストに混ぜて出す（完了ボタンも共通で使えるように）
  function addoneAsTasks() {
    var addone = ((window.AI_STATE || {}).addone || {}).tasks || [];
    return addone.map(function (a) {
      return {
        id: a.id, title: a.text, owner: "add one",
        status: a.status === "done" ? "done" : "todo",
        progress: 0, hint: "", cmd: "",
        log: [{ time: a.receivedAt || "", text: (a.source || "") + (a.note ? "：" + a.note : "") }],
        deliverables: a.url ? [{ title: "元メッセージ・シートを開く", url: a.url, type: "リンク" }] : [],
        _kind: "addone",
      };
    });
  }
  function allTasks() {
    var base = ((window.AI_STATE || {}).tasks || []).map(function (t) { t._kind = "task"; return t; });
    return base.concat(addoneAsTasks());
  }
  function taskById(id) {
    var found = null;
    allTasks().forEach(function (t) { if (t && t.id === id) found = t; });
    return found;
  }
  function tasksOf(name) {
    return allTasks().filter(function (t) { return t && t.owner === name; });
  }
  function reviewTasks() {
    return allTasks().filter(function (t) { return t && t.status === "review"; });
  }
  // 社員のリング色（game.js の RING と同じ並び）
  var OWNER_PALETTE = ["#23b3a3", "#e87fb0", "#5aa95b", "#e0913a", "#5b8def", "#c0a93f"];
  function ownerColor(name) {
    var emps = (window.COMPANY || {}).employees || [];
    for (var i = 0; i < emps.length; i++) {
      if (emps[i] && emps[i].name === name) return OWNER_PALETTE[i % OWNER_PALETTE.length];
    }
    return "#8a7ff0"; // 不明（アイ等）
  }

  // 種類・リンクからアイコンを決める
  function iconFor(type, url) {
    var t = (type || "") + "";
    if (/スプレッド|sheet|シート/i.test(t)) return "📊";
    if (/ドキュメント|doc|文書/i.test(t)) return "📝";
    if (/フォルダ|drive|ドライブ/i.test(t)) return "📁";
    if (/コード|code|スクリプト/i.test(t)) return "💻";
    if (/スライド|slide/i.test(t)) return "📑";
    if (/画像|image|図/i.test(t)) return "🖼";
    if (/リンク|link|url/i.test(t)) return "🔗";
    if (url) return "🔗";
    return "📄";
  }
  function escAttr(s) { return String(s == null ? "" : s).replace(/"/g, "%22"); }
  // 外部URLを新規タブで開く（埋め込みブラウザ用のフォールバック）
  function openUrlFallback(url) {
    if (!url) return;
    var a = document.createElement("a");
    a.href = url; a.target = "_blank"; a.rel = "noopener";
    document.body.appendChild(a); a.click();
    setTimeout(function () { if (a.parentNode) a.parentNode.removeChild(a); }, 0);
  }
  // 外部URLを開く：本体（server）経由でPCの標準ブラウザに渡せるなら渡す
  // （プレビューペインは localhost 以外を開けないため）。無理なら新規タブにフォールバック。
  function openUrl(url) {
    if (!url) return;
    var base = (window.AI_CONFIG || {}).apiBase || (location.protocol.indexOf("http") === 0 ? location.origin : "");
    if (base && /^https?:\/\/(localhost|127\.0\.0\.1)/.test(base)) {
      fetch(base.replace(/\/$/, "") + "/api/open-url", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: url }),
      }).then(function (r) { return r.json(); })
        .then(function (j) { if (!(j && j.ok)) openUrlFallback(url); })
        .catch(function () { openUrlFallback(url); });
      return;
    }
    openUrlFallback(url);
  }
  // 資料棚・成果物などの素の <a href="http..."> クリックを横取りして、本体経由でPCのブラウザで開く。
  // （プレビューペインの "Preview only supports localhost URLs" ブロック対策）
  document.addEventListener("click", function (ev) {
    var a = ev.target && ev.target.closest ? ev.target.closest('a[href^="http"]') : null;
    if (!a) return;
    var href = a.getAttribute("href") || "";
    if (/^https?:\/\/(localhost|127\.0\.0\.1)/.test(href)) return; // ローカルはそのまま
    ev.preventDefault();
    openUrl(href);
  }, true);

  // ローカルファイルを「コンピューター上で」開く（server/ 経由でOSの標準アプリが起動）
  // ローカルの本体が必要。成功すれば true、無理なら false を返す。
  function openLocalFile(path, app) {
    var base = (window.AI_CONFIG || {}).apiBase || (location.protocol.indexOf("http") === 0 ? location.origin : "");
    if (!base || !/^https?:\/\/(localhost|127\.0\.0\.1)/.test(base)) return Promise.resolve(false);
    return fetch(base.replace(/\/$/, "") + "/api/open-file", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: path, app: app || "" }),
    }).then(function (r) { return r.json(); })
      .then(function (j) { return !!(j && j.ok); })
      .catch(function () { return false; });
  }

  // リポジトリ内のファイルをGitHub上で開くためのURL（Renderなど、ローカル本体が使えない環境向け）
  var REPO_URL_BASE = "https://github.com/kanto-jr-tennis-supporter/ai-company-temahima/blob/claude/company-situation-06lpad/";
  function repoFileUrl(path) {
    return REPO_URL_BASE + String(path).split("/").map(encodeURIComponent).join("/");
  }

  // クリック時の挙動：url → 新規タブで開く ／ path → コンピューター上で開く（無理ならGitHubで開く）
  function openDeliverableSmart(d) {
    if (!d) return;
    if (d.url) { openUrl(d.url); return; }
    if (d.path) {
      var base = (window.AI_CONFIG || {}).apiBase || (location.protocol.indexOf("http") === 0 ? location.origin : "");
      var isLocal = base && /^https?:\/\/(localhost|127\.0\.0\.1)/.test(base);
      if (isLocal) {
        openLocalFile(d.path, d.app).then(function (ok) {
          if (!ok) openUrl(repoFileUrl(d.path)); // ローカル本体が動いていなければGitHubで開く
        });
      } else {
        openUrl(repoFileUrl(d.path)); // Renderなどローカル本体が無い環境ではGitHubで開く
      }
      return;
    }
    openDeliverable(d); // テキスト本文のみはビューアで
  }

  // 成果物ビューア（中身＋リンク／ファイルを開く）
  function openDeliverable(d) {
    if (!d) return;
    var meta = [d.who, d.at, d.type].filter(Boolean).map(esc).join(" ・ ");
    var html = '<div class="app-title">' + iconFor(d.type, d.url) + ' ' + esc(d.title || "成果物") + '</div>' +
      (meta ? '<div class="app-note">' + meta + '</div>' : '');

    // 外部リンク（スプレッドシート / ドキュメント / Drive 等）
    if (d.url) {
      html += '<a class="submit-btn" href="' + escAttr(d.url) + '" target="_blank" rel="noopener" ' +
        'style="display:block;text-align:center;text-decoration:none;margin-top:6px">🔗 開く ↗</a>' +
        '<div class="form-hint" style="word-break:break-all;margin-bottom:4px">' + esc(d.url) + '</div>';
    }
    // ローカルファイルのパス
    if (d.path) {
      html += '<button class="submit-btn" data-openfile style="margin-top:6px">📂 コンピューターで開く</button>' +
        '<div class="plabel">📁 ファイルの場所</div>' +
        '<div class="prompt-box"><span style="word-break:break-all">' + esc(d.path) + '</span>' +
        '<button class="copy-btn" data-copypath>コピー</button></div>';
    }
    // テキスト本文（あれば）
    if (d.body) {
      html += '<div class="qcode" style="display:block;width:auto;margin-top:10px">' +
        '<div class="qcode-top"><span class="qcode-label">▼ 内容</span>' +
        '<button class="qcopy" data-copy>コピー</button></div>' +
        '<pre>' + esc(d.body) + '</pre></div>';
    }
    if (!d.url && !d.path && !d.body) {
      html += '<div class="app-note" style="margin-top:8px">（中身はまだありません）</div>';
    }
    html += '<button class="close" data-close>閉じる</button>';
    openPanel(html);

    var ofb = modal.querySelector("[data-openfile]");
    if (ofb) ofb.onclick = function () {
      ofb.textContent = "開いています…";
      openLocalFile(d.path, d.app).then(function (ok) {
        ofb.textContent = ok ? "開きました ✓" : "ここからは開けません。チャットで「" + (d.title || "この成果物") + "を開いて」と頼んでください";
        setTimeout(function () { ofb.textContent = "📂 コンピューターで開く"; }, 3500);
      });
    };
    var cb = modal.querySelector("[data-copy]");
    if (cb) cb.onclick = function () {
      copyText(d.body || "").then(function (ok) {
        cb.textContent = ok ? "コピー済み✓" : "⌘C でコピー";
        setTimeout(function () { cb.textContent = "コピー"; }, ok ? 1500 : 2500);
      });
    };
    var cp = modal.querySelector("[data-copypath]");
    if (cp) cp.onclick = function () {
      copyText(d.path || "").then(function (ok) {
        cp.textContent = ok ? "コピー済み✓" : "⌘C でコピー";
        setTimeout(function () { cp.textContent = "コピー"; }, ok ? 1500 : 2500);
      });
    };
  }
  window.openDeliverable = openDeliverable;

  // 🔗 リンク・資料棚（本棚クリック / ダッシュボードから）
  window.openLinks = function () {
    var links = (window.AI_STATE && window.AI_STATE.links) || [];
    var body = links.length
      ? links.map(function (l) {
          return '<a class="row link-row" href="' + escAttr(l.url) + '" target="_blank" rel="noopener">' +
            '<div class="ic">' + iconFor(l.type, l.url) + '</div><div class="tx"><div class="tt">' + esc(l.title) + '</div>' +
            '<div class="sub" style="word-break:break-all">' + esc(l.type || l.url || "") + '</div></div>' +
            '<div class="time">開く ↗</div></a>';
        }).join("")
      : '<div class="app-note">まだ登録された資料はありません。<br>Claude Code に「このスプレッドシートを資料棚に追加して」と頼むと、ここに並びます。</div>';
    openPanel('<div class="app-title">🔗 資料棚（リンク・資料）</div>' +
      '<div class="app-note">資料室の本棚。会社のスプレッドシート・ドキュメント・Driveなど。クリックで開きます。</div>' +
      body + '<button class="close" data-close>閉じる</button>');
  };

  window.openTalk = function (e) {
    var le = liveEmp(e.name);
    var status = le.status || "idle";
    var m = STT[status] || STT.idle;
    // v2：いまのタスク・進捗・成果物は tasks から引く
    var curTask = le.taskId ? taskById(le.taskId) : null;
    var task = curTask ? (curTask.id + " " + curTask.title) : (le.task || "");
    var prog = Math.max(0, Math.min(100, (curTask ? Number(curTask.progress) : le.progress) || 0));
    var dels = [];
    tasksOf(e.name).forEach(function (t) {
      (t.deliverables || []).forEach(function (d) { dels.push(d); });
    });
    if (le.deliverables) dels = dels.concat(le.deliverables); // 旧形式の保険
    var logs = empLog(e.name).slice(0, 5);
    window.__talkDels = dels;
    // この社員からの提案（あれば詳細内に「提案を見る」ボタンを出す）
    var myProps = ((window.AI_STATE || {}).proposals || []).filter(function (p) { return p && p.from === e.name; });
    var empIdx = ((window.COMPANY || {}).employees || []).map(function (x) { return x.name; }).indexOf(e.name);

    var html =
      '<span class="big">' + e.emoji + '</span>' +
      '<h2>' + esc(e.name) + '</h2><div class="mrole">' + esc(e.role) + '</div>' +
      '<div class="emp-status"><span class="stt ' + m[1] + '">' + m[0] + '</span>' +
      (task ? '<span class="emp-task">' + esc(task) + '</span>' : '') + '</div>' +
      ((status === "working" || prog > 0)
        ? '<div class="pbar"><i style="width:' + prog + '%"></i></div><div class="pbar-label">進捗 ' + prog + '%</div>'
        : '') +
      '<div class="desc">' + (e.desc || "") + '</div>';

    // 💬 提案を見るボタン（提案がある社員のみ。動く吹き出しを狙わなくても、本人タップ→ここから開ける）
    if (myProps.length) {
      html += '<button class="talk-prop-btn" data-talkprop="' + empIdx + '">' +
        '<span class="tpb-ic">💬</span>提案があります（' + myProps.length + '件）― 見る' +
        '<span class="tpb-count">' + myProps.length + '</span></button>';
    }

    if (e.skills && e.skills.length) {
      html += '<div class="plabel">⚡ できること（専用スキル）</div><ul class="dlist">' +
        e.skills.map(function (s) {
          return '<li><span class="dot doing"></span><div style="flex:1">' + esc(s) + '</div></li>';
        }).join("") + '</ul>';
    }

    if (dels.length) {
      html += '<div class="plabel">📦 この社員の成果物（クリックで開く）</div>' +
        dels.map(function (d, i) {
          var inner = '<div class="ic">' + iconFor(d.type, d.url) + '</div><div class="tx"><div class="tt">' + esc(d.title) + '</div>' +
            '<div class="sub">' + [d.type, d.at].filter(Boolean).map(esc).join(" ・ ") + '</div></div>' +
            '<div class="time">' + (d.url ? "開く ↗" : "開く ›") + '</div>';
          if (d.url) return '<a class="row del-row" href="' + escAttr(d.url) + '" target="_blank" rel="noopener">' + inner + '</a>';
          return '<div class="row del-row" data-del="' + i + '" style="cursor:pointer">' + inner + '</div>';
        }).join("");
    }

    if (logs.length) {
      html += '<div class="plabel">🕒 今日の動き</div><ul class="dlist">' +
        logs.map(function (a) {
          return '<li><span class="dot"></span><div><div>' + esc(a.text) + '</div>' +
            '<div class="who">' + esc(a.time || "") + '</div></div></li>';
        }).join("") + '</ul>';
    }

    html += '<div class="plabel">▼ この社員への話しかけ方（Claude Code に入力）</div>' +
      '<div class="prompt-box"><span>' + esc(e.prompt) + '</span>' +
      '<button class="copy-btn" data-copy>コピー</button></div>' +
      '<button class="close" data-close>閉じる</button>';

    openPanel(html);

    var tpb = modal.querySelector("[data-talkprop]");
    if (tpb) tpb.onclick = function () {
      if (window.openEmployeeProposals) window.openEmployeeProposals(+tpb.getAttribute("data-talkprop"));
    };

    var cb = modal.querySelector("[data-copy]");
    if (cb) cb.onclick = function () {
      copyText(e.prompt).then(function (ok) {
        cb.textContent = ok ? "コピー済み✓" : "⌘C でコピー";
        setTimeout(function () { cb.textContent = "コピー"; }, ok ? 1500 : 2500);
      });
    };
    Array.prototype.forEach.call(modal.querySelectorAll(".del-row[data-del]"), function (row) {
      row.onclick = function () { openDeliverableSmart(window.__talkDels[+row.getAttribute("data-del")]); };
    });
  };

  // 壁アプリ：未連携=サンプル / 連携済み(hosted)=実データ
  var APP_TITLE = { mail: "📧 案件・クライアント関連メール", calendar: "📅 今日の予定", line: "💬 LINE" };

  // サンプルは「いまの社員チーム」に連動させる（勝ち筋を変えると中身も変わる）
  function empReportLine(role) {
    var r = role || "";
    if (/リサーチ|案件|調査|キーワード|企画|ネタ/.test(r)) return "条件に合いそうなネタ・案件を3件ピックしました。";
    if (/提案|ライ|コピー|本文|営業/.test(r)) return "下書きが完成しています。確認をどうぞ。";
    if (/要件|定義|ヒアリング|プランナー|設計|ディレク/.test(r)) return "今日の進め方を整理しました。";
    if (/デザ|ビジュアル|サムネ|画像/.test(r)) return "ビジュアル案ができました。";
    if (/自動化|エンジ|開発|コーディング|編集|字幕|テロップ/.test(r)) return "作ってみたので、見てもらえますか？";
    if (/分析|改善/.test(r)) return "先週の数字をまとめました。";
    return "今日のタスクが進みました。";
  }
  function getSample(type) {
    var c = window.COMPANY || {};
    var emps = c.employees || [];
    if (type === "mail") {
      var rows = emps.slice(0, 2).map(function (e, i) {
        return { ic: e.emoji || "📨", tt: (e.name || "社員") + "（" + (e.role || "") + "）",
          sub: empReportLine(e.role), time: i === 0 ? "9:02" : "9:15" };
      });
      rows.push({ ic: "📨", tt: "B社 ご担当者様", sub: "お見積もりありがとうございます。一度お打ち合わせを…", time: "10:40" });
      return rows;
    }
    if (type === "calendar") {
      var cal = [{ ic: "🔔", tt: "AI社員と作戦会議", sub: "今日やることを決める", time: "9:00" }];
      var e0 = emps[0], e1 = emps[1];

  // file:// や非セキュア文脈では navigator.clipboard が使えないため execCommand でフォールバック
  function fallbackCopy(text) {
    try {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed"; ta.style.top = "0"; ta.style.left = "0";
      ta.style.width = "1px"; ta.style.height = "1px"; ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      var ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e) { return false; }
  }
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {

        .catch(function () { return fallbackCopy(text); });

    return Promise.resolve(fallbackCopy(text));
  }

      return '<li><span class="dot todo"></span><div style="flex:1"><div><b>' + esc(p.title || "") + '</b></div>' +
        '<div class="who">' + esc(p.from || "") + (p.at ? " ・ " + esc(p.at) : "") + '</div>' +
        (p.detail ? '<div style="font-size:12px;color:#6a6f7d;margin-top:3px">' + esc(p.detail) + '</div>' : "") +
        '</div><div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">' +
          '<button class="qbtn" data-adopt="' + o.gi + '">採用 →</button>' +
          '<button class="qbtn qbtn-reject" data-reject="' + o.gi + '">却下</button>' +
        '</div></li>';
    }).join("") + '</ul>' +
      '<div class="app-note" style="margin-top:10px">「採用 →」「却下」を押すと指示文をコピーします。チャットに ⌘V → Enter で実行すると、私が反映します。</div>';
    openPanel('<div class="app-title">💬 ' + esc(name) + 'からの提案（' + mine.length + '件）</div>' + body +
      '<button class="close" data-close>閉じる</button>');
    Array.prototype.forEach.call(modal.querySelectorAll("[data-adopt]"), function (btn) {
      btn.onclick = function () {
        var p = all[+btn.getAttribute("data-adopt")];
        var text = (p.from || "社員") + "の提案「" + (p.title || "") + "」を採用して進めて";
        copyText(text).then(function (ok) {
          btn.textContent = ok ? "コピーした ✓" : "コピー失敗";
          setTimeout(function () { btn.textContent = "採用 →"; }, 1600);
        });
      };
    });
    Array.prototype.forEach.call(modal.querySelectorAll("[data-reject]"), function (btn) {
      btn.onclick = function () {
        var p = all[+btn.getAttribute("data-reject")];
        var text = (p.from || "社員") + "の提案「" + (p.title || "") + "」を却下して（提案リストから消して）";
        copyText(text).then(function (ok) {
          btn.textContent = ok ? "コピーした ✓" : "コピー失敗";
          setTimeout(function () { btn.textContent = "却下"; }, 1600);
        });
      };
    });
  };

  // ===== 秘書アイ（ガイド役）：今の状況から「次の一手」を1つだけ決める =====
  window.computeNextAction = function (s) {
    s = s || {};
    var setup = s.setup || {};
    var steps = setup.steps || [];
    var tasks = s.tasks || [];
    var revs = tasks.filter(function (t) { return t.status === "review"; });
    var props = (s.proposals || []).length;
    var emps = s.employees || [];
    var working = emps.filter(function (e) { return e.status === "working"; });
    var todo = tasks.filter(function (t) { return t.status === "todo"; });
    var dels = tasks.reduce(function (n, t) { return n + ((t.deliverables || []).length); }, 0);

    if (steps.length && !setup.completed) {
      var sdone = steps.filter(function (x) { return x.done; }).length;
      return sdone === 0
        ? { label: "セットアップを始める", cmd: "セットアップを始めて", why: "まずは5〜15分で、あなた専用の会社を立ち上げましょう" }
        : { label: "セットアップの続きをやる", cmd: "セットアップを続けて", why: "開業準備がまだ途中です（" + sdone + "/" + steps.length + "）" };
    }
    if (revs.length)
      return { label: "確認待ちのタスクを見る（🖐 " + revs.length + "件）",
        cmd: revs[0].cmd || (revs[0].id ? revs[0].id + "の中身を見せて" : "確認待ちのタスクを見せて"),
        why: "社長の確認待ちで仕事が止まっています（" + revs.map(function (t) { return t.id; }).filter(Boolean).join("・") + "）" };
    if (!tasks.length)
      return { label: "今日やることを決める", cmd: "今日やることを決めよう", why: "タスクがまだ空です" };
    if (todo.length && !working.length)
      return { label: "社員に仕事を振る", cmd: todo[0].cmd || ((todo[0].owner ? todo[0].owner + "、" : "") + "「" + todo[0].title + "」を進めて"), why: "未着手タスクがあるのに、全員手が空いています" };
    if (working.length)
      return { label: "進捗を聞く（" + working.map(function (e) { return e.name; }).join("・") + "が作業中）", cmd: "進捗どう？", why: "社員が作業中です。待っている間に他の指示もできます" };
    if (props > 0)
      return { label: "社員からの提案を見る（" + props + "件）", cmd: "社員からの提案を見せて", why: "社員が頭上の💬で提案を出しています" };
    if (dels > 0)
      return { label: "納品BOXを確認する", cmd: "最近の成果物をまとめて", why: "受け取っていない成果物があるかもしれません" };
    return { label: "次のタスクを決める", cmd: "次にやることを提案して", why: "全員手が空いています。タスク候補を出させましょう" };
  };

  // 🧭 秘書アイのガイドパネル：いまの状況＋次の一手
  window.openGuide = function () {
    var s = window.AI_STATE || {};
    var setup = s.setup || {};
    var steps = setup.steps || [];
    var done = steps.filter(function (x) { return x.done; }).length;
    var tasks = s.tasks || [];
    var cnt = { todo: 0, doing: 0, review: 0, done: 0 };
    tasks.forEach(function (t) { if (cnt[t.status] != null) cnt[t.status]++; });
    var emps = s.employees || [];
    var working = emps.filter(function (e) { return e.status === "working"; });
    var dels = tasks.reduce(function (n, t) { return n + ((t.deliverables || []).length); }, 0);
    var na = window.computeNextAction(s);

    var row = function (ic, label, val) {
      return '<li><span class="dot"></span><div style="flex:1">' + ic + " " + label + '</div><span class="meta">' + val + '</span></li>';
    };

    // 動いている・止まっているタスクの「事情」を1件1行で（review → doing の順）
    var active = tasks.filter(function (t) { return t.status === "review"; })
      .concat(tasks.filter(function (t) { return t.status === "doing"; }));
    var activeRows = active.slice(0, 4).map(function (t) {
      var why = t.status === "review"
        ? (t.hint || "社長のOK待ちで止まっています")
        : ((t.log && t.log.length ? t.log[t.log.length - 1].text : "作業中") + (t.progress ? "（" + t.progress + "%）" : ""));
      return '<li><span class="dot ' + (t.status === "review" ? "todo" : "doing") + '"></span>' +
        '<div style="flex:1"><div><b>' + esc(t.id || "") + '</b> ' + esc(t.title || "") +
        '<span class="who">（' + esc(t.owner || "担当未定") + '・' + (t.status === "review" ? "🖐あなた待ち" : "💻作業中") + '）</span></div>' +
        '<div style="font-size:11.5px;color:#8a90a2;margin-top:1px">' + esc(why) + '</div></div></li>';
    }).join("");

    var body =
      '<div class="app-note">こんにちは、秘書の' + esc((((window.COMPANY || {}).secretary || {}).name) || "アイ") + 'です。いまの会社の状況と、次にやるといいことをご案内します。</div>' +
      '<div class="plabel">📊 いまの状況</div><ul class="dlist">' +
      row("🚀", "開業準備", (setup.completed ? "完了（営業中）" : done + " / " + steps.length)) +
      row("📋", "タスク", tasks.length ? "これから" + cnt.todo + " ・ 作業中" + cnt.doing + " ・ 確認待ち" + cnt.review + " ・ 完了" + cnt.done : "未設定") +
      row("📦", "納品済みの成果物", dels + " 件") +
      row("💬", "社員からの提案", (s.proposals || []).length + " 件") +
      '</ul>' +
      (activeRows
        ? '<div class="plabel">🔎 動いているタスクの事情</div><ul class="dlist">' + activeRows + '</ul>'
        : '') +
      '<div class="plabel">▶ 次の一手（おすすめ）</div>' +
      '<div style="background:#E3F2E8;border:1px solid #BFE3CD;border-radius:12px;padding:12px 14px;margin:6px 0">' +
      '<div style="font-weight:800;color:#4D9968">' + esc(na.label) + '</div>' +
      '<div style="font-size:12px;color:#6a6f7d;margin-top:3px">' + esc(na.why) + '</div></div>' +
      '<div class="prompt-box"><span>' + esc(na.cmd) + '</span><button class="copy-btn" data-copy>コピー</button></div>' +
      '<div class="app-note" style="margin-top:8px">チャットで「<b style="color:#4D9968">今どういう状況？</b>」「<b style="color:#4D9968">次何すればいい？</b>」と聞いても、私が同じことをお答えします。</div>' +
      '<button class="close" data-close>閉じる</button>';
    openPanel('<div class="app-title">🧭 秘書' + esc((((window.COMPANY || {}).secretary || {}).name) || "アイ") + '（ガイド）</div>' + body);
    var cb = modal.querySelector("[data-copy]");
    if (cb) cb.onclick = function () {
      copyText(na.cmd).then(function (ok) {
        cb.textContent = ok ? "コピー済み✓" : "⌘C でコピー";
        setTimeout(function () { cb.textContent = "コピー"; }, ok ? 1500 : 2500);
      });
    };
  };

  // ===== チャット連動（ライブミラー）=====
  // Claude Code が state.js を書き換える → 定期的に読み直してオフィスに反映する。
  function renderOffice(s) {
    if (!s) return;
    if (window.AIOffice && window.AIOffice.applyState) window.AIOffice.applyState(s);
    playCommand(s.command);
  }

  // 同じ演出（command.id）はリロードしても再生しない（localStorageで記憶）
  var __lastCmd = lsGet("lastcmd");
  function playCommand(cmd) {
    if (!cmd || !cmd.id || cmd.id === __lastCmd) return;
    __lastCmd = cmd.id;
    lsSet("lastcmd", cmd.id);
    if (cmd.type === "inauguration") window.playInauguration();
    else if (cmd.type === "meeting") { if (window.__startMeeting) window.__startMeeting(); }
    else if (cmd.type === "founding") playFounding(window.COMPANY || {});
  }

  // state.js を読み直す。http(s) ではタイムスタンプでキャッシュ回避（ライブ更新）。
  // file://（ダブルクリック起動）ではクエリを付けない（パスが壊れて読めなくなるため）。
  var __httpServed = (location.protocol === "http:" || location.protocol === "https:");
  function loadState() {
    var sc = document.createElement("script");
    sc.src = "state.js" + (__httpServed ? "?t=" + Date.now() : "");
    sc.onload = function () { try { renderOffice(window.AI_STATE); } catch (e) {} if (sc.parentNode) sc.parentNode.removeChild(sc); };
    sc.onerror = function () { if (sc.parentNode) sc.parentNode.removeChild(sc); };
    document.body.appendChild(sc);
  }

  // 連携状態 → 壁アプリのランプ（🟢=連携中／⚪=サンプル）
  function pollHealth() {
    var base = (window.AI_CONFIG || {}).apiBase || (__httpServed ? location.origin : "");
    if (!base) return;
    fetch(base.replace(/\/$/, "") + "/health")
      .then(function (r) { return r.json(); })
      .then(function (j) { if (window.AIOffice && window.AIOffice.applyHealth) window.AIOffice.applyHealth(j || {}); })
      .catch(function () { if (window.AIOffice && window.AIOffice.applyHealth) window.AIOffice.applyHealth({}); });
  }

  loadState(); pollHealth();
  setInterval(pollHealth, 30000);

  // 更新方式：
  //   サーバー経由（http）→ SSE で state.js の保存を即プッシュ（ほぼリアルタイム）。保険で15秒に1回読み直し。
  //   file:// やSSE切断中 → 4秒ポーリングにフォールバック。
  var __pollTimer = null;
  function setPoll(ms) {
    if (__pollTimer) clearInterval(__pollTimer);
    __pollTimer = setInterval(loadState, ms);
  }
  setPoll(4000);
  if (__httpServed && window.EventSource) {
    try {
      var __es = new EventSource("/api/state-events");
      __es.onopen = function () { setPoll(15000); loadState(); };
      __es.onmessage = function () { loadState(); };
      __es.onerror = function () { setPoll(4000); }; // 切断中は従来ポーリング（SSEは自動再接続）
    } catch (e) {}
  }
</script>
<script src="office.js"></script>
</body>
</html>
